name: pige-coloc

# Tourne toutes les 15 min (heure UTC). Lancement manuel aussi possible.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write   # pour pouvoir réécrire seen.json (l'état des annonces vues)

concurrency:
  group: pige-coloc
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Tests (fail-fast si le code est cassé)
        run: python test_pige.py

      - name: Lancer la pige
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Sauvegarder l'état (annonces déjà vues)
        run: |
          git config user.name "pige-bot"
          git config user.email "pige-bot@users.noreply.github.com"
          git add seen.json
          git commit -m "chore: maj état pige [skip ci]" || { echo "rien à committer"; exit 0; }
          # push résilient : si le remote a bougé, on rebase et on réessaie
          git push || (git pull --rebase --autostash && git push)
